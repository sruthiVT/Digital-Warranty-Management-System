<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css">

    <style>
        .card {
            display: inline-block;
            width: 200px;
            padding: 20px;
            margin: 10px;
            border-radius: 10px;
            background-color: #f2f2f2;
            text-align: center;
            box-shadow: 2px 2px 10px #ccc;
        }

        .number {
            font-size: 30px;
            font-weight: bold;
            color: #2c3e50;
        }
    </style>
</head>

<body>

<h1>Dashboard</h1>

<nav>
    <a href="index.html">Home</a>
    <a href="register-product.html">Register Product</a>
    <a href="products.html">View Products</a>
    <a href="claims.html">Claims</a>
    <a href="dashboard.html">Dashboard</a>
</nav>

<hr>

<h2>System Overview</h2>

<div class="card">
    <h3>Total Products</h3>
    <div class="number" id="totalProducts">0</div>
</div>

<div class="card">
    <h3>Total Claims</h3>
    <div class="number" id="totalClaims">0</div>
</div>

<div class="card">
    <h3>Active Warranties</h3>
    <div class="number" id="activeWarranties">0</div>
</div>

<div class="card">
    <h3>Expired Warranties</h3>
    <div class="number" id="expiredWarranties">0</div>
</div>

<script>
function loadDashboard() {

    // PRODUCTS
    let products = JSON.parse(localStorage.getItem("products")) || [];

    // CLAIMS
    let claims = JSON.parse(localStorage.getItem("claims")) || [];

    let today = new Date();

    let active = 0;
    let expired = 0;

    products.forEach(p => {
        let expiryDate = new Date(p.expiryDate);

        if (expiryDate >= today) {
            active++;
        } else {
            expired++;
        }
    });

    // Update UI
    document.getElementById("totalProducts").innerText = products.length;
    document.getElementById("totalClaims").innerText = claims.length;
    document.getElementById("activeWarranties").innerText = active;
    document.getElementById("expiredWarranties").innerText = expired;
}

loadDashboard();
</script>

</body>

</html>
